<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liz Youmans | Multimedia Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
--primary:#5B7DBF;
--accent:#F28C4C;
--accent-dark:#B06A8C;
--light:#f8f9fc;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,var(--primary),#3e57a3);
min-height:100vh;
overflow-x:hidden;
cursor:none;
}

/* Subtle Animated Background */
body::before, body::after{
content:"";
position:fixed;
width:600px;
height:600px;
border-radius:50%;
filter:blur(120px);
opacity:.25;
z-index:-1;
animation:float 20s infinite ease-in-out alternate;
}
body::before{background:#F28C4C;top:-150px;left:-150px;}
body::after{background:#B06A8C;bottom:-150px;right:-150px;animation-delay:5s;}
@keyframes float{
from{transform:translate(0,0);}
to{transform:translate(60px,40px);}
}

/* HOME */
#home{
display:flex;flex-direction:column;justify-content:center;align-items:center;
min-height:100vh;color:white;text-align:center;padding:40px;
animation:fadeIn 1s ease;
}
#home h1{font-size:68px;font-weight:800;letter-spacing:-2px;}
.menu-grid{
margin-top:50px;display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;width:100%;max-width:800px;
}
.menu-btn{
background:var(--accent);border:none;padding:18px;
border-radius:14px;color:white;font-weight:600;
cursor:pointer;transition:.3s;
box-shadow:0 8px 20px rgba(0,0,0,.2);
}
.menu-btn:hover{
transform:translateY(-6px);
background:var(--accent-dark);
box-shadow:0 12px 30px rgba(0,0,0,.3);
}

/* PORTFOLIO */
#portfolio{display:none;min-height:100vh;background:var(--light);}
#portfolio.active{display:flex;animation:fadeIn .6s ease;}

#sidebar{
width:230px;background:#111;padding:30px 20px;color:white;
}
.nav-btn{
display:block;width:100%;padding:12px;margin-bottom:12px;
background:#1f1f1f;border:none;color:white;border-radius:10px;
cursor:pointer;transition:.3s;
}
.nav-btn:hover,.nav-btn.active{background:var(--accent);}

#main{flex:1;padding:60px;position:relative;overflow:hidden;}

/* Section Animations */
.section{
position:absolute;width:100%;
opacity:0;transform:translateX(40px);
transition:all .5s ease;
}
.section.active{
opacity:1;transform:translateX(0);position:relative;
}

/* Intro + Parallax */
.intro{display:flex;flex-wrap:wrap;gap:50px;align-items:center;}
.headshot-wrapper{
perspective:1000px;
}
.headshot{
width:280px;border-radius:24px;
box-shadow:0 20px 50px rgba(0,0,0,.25);
transition:transform .2s ease;
}

/* Cards */
.card{
background:white;padding:30px;border-radius:20px;
box-shadow:0 12px 30px rgba(0,0,0,.08);
margin-bottom:30px;transition:.3s;
}
.card:hover{
transform:translateY(-6px);
box-shadow:0 16px 40px rgba(0,0,0,.12);
}

.resume-btn{
display:inline-block;padding:14px 30px;
background:var(--accent);color:white;
border-radius:12px;text-decoration:none;
font-weight:600;transition:.3s;
}
.resume-btn:hover{
background:var(--accent-dark);
transform:translateY(-4px);
}

/* Waveform Background */
.wave-container{
position:relative;
overflow:hidden;
}
.wave{
position:absolute;
width:200%;
height:120px;
background:repeating-linear-gradient(
90deg,
rgba(242,140,76,.4) 0px,
rgba(242,140,76,.4) 2px,
transparent 2px,
transparent 8px
);
bottom:0;
animation:waveMove 6s linear infinite;
opacity:.4;
}
@keyframes waveMove{
from{transform:translateX(0);}
to{transform:translateX(-50%);}
}

/* Media */
.youtube-container{
position:relative;padding-bottom:56.25%;
height:0;overflow:hidden;border-radius:24px;
box-shadow:0 20px 50px rgba(0,0,0,.2);
}
.youtube-container iframe{
position:absolute;top:0;left:0;width:100%;height:100%;border:0;
}

/* Contact */
.contact-card{
background:var(--primary);
color:white;padding:40px;border-radius:24px;
max-width:600px;
}

@keyframes fadeIn{
from{opacity:0;}to{opacity:1;}
}

/* Microphone Cursor */
#mic-cursor{
position:fixed;width:28px;height:28px;
background:url("data:image/svg+xml;utf8,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23F28C4C'>
<path d='M12 14a3 3 0 003-3V5a3 3 0 10-6 0v6a3 3 0 003 3zm5-3a1 1 0 10-2 0 3 3 0 01-6 0 1 1 0 10-2 0 5 5 0 004 4.9V19H8a1 1 0 100 2h8a1 1 0 100-2h-3v-2.1a5 5 0 004-4.9z'/>
</svg>");
background-size:contain;background-repeat:no-repeat;
pointer-events:none;transform:translate(-50%,-50%);
z-index:9999;transition:transform .08s ease;
}

@media(max-width:900px){
#portfolio{flex-direction:column;}
#sidebar{width:100%;display:flex;overflow-x:auto;}
#main{padding:30px;}
.section{position:relative;}
body{cursor:auto;}
#mic-cursor{display:none;}
}
</style>
</head>

<body>

<div id="home">
<h1>Liz Youmans</h1>
<p style="color:white;margin-top:10px;">Multimedia Professional</p>
<div class="menu-grid">
<button class="menu-btn" onclick="openPage('intro')">Intro</button>
<button class="menu-btn" onclick="openPage('work')">Work</button>
<button class="menu-btn" onclick="openPage('onair')">On Air</button>
<button class="menu-btn" onclick="openPage('onscreen')">On Screen</button>
<button class="menu-btn" onclick="openPage('contact')">Contact</button>
</div>
</div>

<div id="portfolio">
<div id="sidebar">
<button class="nav-btn active" onclick="switchPage('intro',this)">Intro</button>
<button class="nav-btn" onclick="switchPage('work',this)">Work</button>
<button class="nav-btn" onclick="switchPage('onair',this)">On Air</button>
<button class="nav-btn" onclick="switchPage('onscreen',this)">On Screen</button>
<button class="nav-btn" onclick="switchPage('contact',this)">Contact</button>
</div>

<div id="main">

<section id="intro" class="section active">
<div class="intro">
<div>
<h1>About Me</h1>
<p>Detail-oriented multimedia professional experienced in broadcast operations, live production, audio engineering, and post-production editing.</p>
</div>
<div class="headshot-wrapper">
<img src="assets/photo.jpg" class="headshot" id="headshot">
</div>
</div>
</section>

<section id="work" class="section">
<h1>Work & Resume</h1>
<div class="card">
<a href="assets/resume.pdf" target="_blank" class="resume-btn">Download Resume</a>
</div>
</section>

<section id="onair" class="section wave-container">
<h1>On Air</h1>
<div class="wave"></div>
<iframe width="100%" height="166" allow="autoplay"
src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/soundcloud%253Atracks%253A2272721219">
</iframe>
</section>

<section id="onscreen" class="section">
<h1>On Screen</h1>
<div class="youtube-container">
<iframe src="https://www.youtube.com/embed/JKwiYQ-5cCU" allowfullscreen></iframe>
</div>
</section>

<section id="contact" class="section">
<h1>Contact</h1>
<div class="contact-card">
<p>Email: <strong>Hananuiliz@gmail.com</strong></p>
</div>
</section>

</div>
</div>

<div id="mic-cursor"></div>

<script>
function openPage(id){
document.getElementById("home").style.display="none";
document.getElementById("portfolio").classList.add("active");
switchPage(id,document.querySelector(".nav-btn"));
}
function switchPage(id,btn){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
if(btn)btn.classList.add("active");
window.scrollTo({top:0,behavior:"smooth"});
}

/* Microphone Cursor */
const mic=document.getElementById("mic-cursor");
document.addEventListener("mousemove",e=>{
mic.style.left=e.clientX+"px";
mic.style.top=e.clientY+"px";
});
document.querySelectorAll("button,a").forEach(el=>{
el.addEventListener("mouseenter",()=>mic.style.transform="translate(-50%,-50%) scale(1.3)");
el.addEventListener("mouseleave",()=>mic.style.transform="translate(-50%,-50%) scale(1)");
});

/* Parallax Headshot */
const headshot=document.getElementById("headshot");
document.addEventListener("mousemove",e=>{
const x=(window.innerWidth/2-e.clientX)/40;
const y=(window.innerHeight/2-e.clientY)/40;
headshot.style.transform=`rotateY(${x}deg) rotateX(${y}deg)`;
});
</script>

</body>
</html>
